name: Windows Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build QKey for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore core tests
        run: dotnet restore src/QKey.Core.Tests/QKey.Core.Tests.csproj

      - name: Build core tests
        run: dotnet build src/QKey.Core.Tests/QKey.Core.Tests.csproj --configuration Release --no-restore

      - name: Run core tests
        run: dotnet run --project src/QKey.Core.Tests/QKey.Core.Tests.csproj --configuration Release --no-build

      - name: Publish Windows app
        run: dotnet publish src/QKey.Windows/QKey.Windows.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output artifacts/QKey-win-x64

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/package | Out-Null
          Compress-Archive -Path artifacts/QKey-win-x64/* -DestinationPath artifacts/package/QKey-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QKey-win-x64
          path: artifacts/package/QKey-win-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/package/QKey-win-x64.zip
          generate_release_notes: true
